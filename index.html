<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>2026 월드컵 트래커</title>
<style>
:root{
  --bg:#f4f6f9;
  --bg-soft:#eef1f5;
  --bg-card:#ffffff;
  --bg-elev:#f7f9fc;
  --line:#d6dce4;
  --line-soft:#e6eaf0;
  --txt:#1a1f27;
  --txt-dim:#5a6675;
  --txt-faint:#94a0ae;
  --accent:#16a360;
  --accent-2:#2563eb;
  --gold:#c8941a;
  --win:#16a360;
  --draw:#94a0ae;
  --loss:#dc3545;
  --live:#e0352b;
  --r:14px;
  --r-sm:9px;
  --shadow:0 1px 2px rgba(20,30,50,.04),0 6px 18px rgba(20,30,50,.07);
  --ff:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue","Apple SD Gothic Neo","Noto Sans KR",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{
  font-family:var(--ff);
  background:
    radial-gradient(1200px 600px at 80% -10%,rgba(37,99,235,.06),transparent 60%),
    radial-gradient(900px 500px at -10% 10%,rgba(22,163,96,.05),transparent 55%),
    var(--bg);
  color:var(--txt);
  line-height:1.45;
  letter-spacing:-.01em;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
  padding-bottom:env(safe-area-inset-bottom);
}
.wrap{max-width:1180px;margin:0 auto;padding:0 14px}

/* ---------- Header ---------- */
header{
  position:sticky;top:0;z-index:40;
  backdrop-filter:saturate(1.4) blur(14px);
  background:rgba(255,255,255,.82);
  border-bottom:1px solid var(--line-soft);
}
.head-inner{display:flex;align-items:center;gap:12px;padding:11px 14px;max-width:1180px;margin:0 auto}
.brand{display:flex;align-items:baseline;gap:9px;min-width:0}
.brand .yr{
  font-size:1.32rem;font-weight:800;letter-spacing:-.03em;
  background:linear-gradient(95deg,var(--accent),var(--accent-2));
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.brand .nm{font-size:.82rem;color:var(--txt-dim);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.host{margin-left:auto;font-size:.7rem;color:var(--txt-faint);font-weight:600;letter-spacing:.02em;white-space:nowrap}
@media(max-width:560px){.host{display:none}}

/* ---------- Tabs ---------- */
.tabs{display:flex;gap:6px;padding:8px 14px 0;max-width:1180px;margin:0 auto}
.tab{
  flex:1;border:0;cursor:pointer;
  background:transparent;color:var(--txt-dim);
  font-family:var(--ff);font-size:.92rem;font-weight:700;letter-spacing:-.01em;
  padding:10px 8px 12px;border-radius:10px 10px 0 0;
  position:relative;transition:color .18s;
}
.tab .sub{display:block;font-size:.62rem;font-weight:600;color:var(--txt-faint);margin-top:1px}
.tab[aria-selected="true"]{color:var(--txt)}
.tab[aria-selected="true"]::after{
  content:"";position:absolute;left:14%;right:14%;bottom:0;height:3px;border-radius:3px;
  background:linear-gradient(90deg,var(--accent),var(--accent-2));
}
.tab:hover{color:var(--txt)}

/* ---------- Group layout: rail + panel ---------- */
.stage{display:none}
.stage.on{display:block}
.group-layout{
  display:grid;
  grid-template-columns:1fr 56px;
  gap:12px;
  padding-top:14px;
  align-items:start;
}
@media(min-width:720px){
  .group-layout{grid-template-columns:64px 1fr;}
  .rail{order:0}
  .panel{order:1}
}
@media(max-width:719px){
  .rail{order:1}
  .panel{order:0}
}

/* rail */
.rail{
  position:sticky;top:108px;z-index:10;
  display:flex;flex-direction:column;gap:5px;
}
.rail-lbl{font-size:.58rem;color:var(--txt-faint);font-weight:700;text-align:center;letter-spacing:.08em;margin-bottom:2px}
.gbtn{
  border:1px solid var(--line);
  background:var(--bg-card);
  color:var(--txt-dim);
  font-family:var(--ff);font-weight:800;font-size:1.02rem;
  height:42px;border-radius:11px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:.16s;position:relative;
}
.gbtn:hover{border-color:var(--txt-faint);color:var(--txt)}
.gbtn[aria-current="true"]{
  background:linear-gradient(150deg,var(--accent),var(--accent-2));
  color:#ffffff;border-color:transparent;
  box-shadow:0 4px 14px rgba(22,163,96,.3);
}
.gbtn .dot{
  position:absolute;top:6px;right:7px;width:5px;height:5px;border-radius:50%;
  background:var(--live);box-shadow:0 0 0 2px var(--bg-card);
  animation:pulse 1.6s infinite;
}
.gbtn[aria-current="true"] .dot{box-shadow:0 0 0 2px #16c97e}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* panel */
.panel{min-width:0;animation:fade .28s ease}
@keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.panel-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.panel-head .gtag{
  font-size:1.5rem;font-weight:800;letter-spacing:-.04em;
  width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;
  background:var(--bg-elev);border:1px solid var(--line);
}
.panel-head h2{font-size:1rem;font-weight:700;color:var(--txt)}
.panel-head .meta{font-size:.72rem;color:var(--txt-faint);font-weight:600;margin-top:1px}
.panel-head .status{margin-left:auto;font-size:.66rem;font-weight:700;color:var(--txt-faint);
  border:1px solid var(--line);padding:4px 9px;border-radius:20px}

/* ---------- Standings ---------- */
.sect-lbl{font-size:.66rem;letter-spacing:.1em;font-weight:700;color:var(--txt-faint);
  text-transform:uppercase;margin:4px 2px 7px;display:flex;align-items:center;gap:7px}
.sect-lbl::after{content:"";flex:1;height:1px;background:var(--line-soft)}
.table-card{background:var(--bg-card);border:1px solid var(--line-soft);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
table.stand{width:100%;border-collapse:collapse;font-size:.82rem}
table.stand th{
  font-size:.6rem;font-weight:700;color:var(--txt-faint);text-align:center;
  padding:7px 2px;border-bottom:1px solid var(--line);letter-spacing:.03em;
}
table.stand th.tl{text-align:left;padding-left:10px}
table.stand td{padding:8px 2px;text-align:center;border-bottom:1px solid var(--line-soft);color:var(--txt-dim);font-variant-numeric:tabular-nums}
table.stand tr:last-child td{border-bottom:0}
td.team{text-align:left;padding-left:8px;color:var(--txt);font-weight:600}
.team-inner{display:flex;align-items:center;gap:8px}
.pos{
  display:inline-flex;align-items:center;justify-content:center;
  width:21px;height:21px;border-radius:6px;font-size:.7rem;font-weight:800;flex:none;
  background:var(--bg-elev);color:var(--txt-dim);
}
tr.q1 .pos{background:rgba(22,163,96,.14);color:var(--accent)}
tr.q2 .pos{background:rgba(37,99,235,.13);color:var(--accent-2)}
tr.q3 .pos{background:rgba(200,148,26,.16);color:var(--gold)}
.flag{flex:none;display:inline-flex;align-items:center}
.flagimg{width:22px;height:15px;object-fit:cover;border-radius:2px;display:block;
  box-shadow:0 0 0 1px rgba(0,0,0,.08)}
.flag-fallback{display:inline-flex;align-items:center;justify-content:center;width:22px;height:15px;
  border-radius:2px;background:var(--bg-elev);color:var(--txt-faint);font-size:.6rem;font-weight:700}
.tname{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
td.pts{font-weight:800;color:var(--txt)}
.host-mark{font-size:.56rem;color:var(--txt-faint);font-weight:700;border:1px solid var(--line);padding:0 4px;border-radius:4px;flex:none}
.legend{display:flex;flex-wrap:wrap;gap:10px;padding:7px 10px;font-size:.62rem;color:var(--txt-faint)}
.legend span{display:flex;align-items:center;gap:5px}
.legend i{width:9px;height:9px;border-radius:3px;display:inline-block}

/* ---------- Matches ---------- */
.match{
  background:var(--bg-card);border:1px solid var(--line-soft);
  border-radius:var(--r-sm);margin-bottom:7px;overflow:hidden;
}
.match-top{display:flex;align-items:center;gap:8px;padding:7px 11px;cursor:pointer;width:100%;border:0;background:none;font-family:var(--ff);color:inherit;text-align:left}
.match-top:hover{background:var(--bg-elev)}
.m-date{font-size:.62rem;color:var(--txt-faint);font-weight:700;width:46px;flex:none;line-height:1.25}
.m-date b{display:block;color:var(--txt-dim);font-size:.66rem}
.m-teams{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
.m-row{display:flex;align-items:center;gap:7px}
.m-row .flag .flagimg{width:21px;height:14px}
.m-row .nm{flex:1;font-size:.84rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.m-row.w .nm{color:var(--txt)}
.m-row.l .nm{color:var(--txt-faint)}
.m-row .sc{font-size:.92rem;font-weight:800;font-variant-numeric:tabular-nums;width:18px;text-align:center}
.m-row.w .sc{color:var(--accent)}
.m-stat{flex:none;display:flex;flex-direction:column;align-items:flex-end;gap:2px;min-width:40px}
.badge-ft{font-size:.58rem;font-weight:800;color:var(--txt-faint);letter-spacing:.04em}
.badge-live{font-size:.58rem;font-weight:800;color:var(--live);letter-spacing:.04em;display:flex;align-items:center;gap:4px}
.badge-live::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--live);animation:pulse 1.4s infinite}
.m-time{font-size:.74rem;font-weight:700;color:var(--txt-dim)}
.m-venue{font-size:.56rem;color:var(--txt-faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px}
.chev{flex:none;width:14px;color:var(--txt-faint);transition:transform .2s;font-size:.7rem}
.match.open .chev{transform:rotate(90deg)}

/* expanded detail */
.m-detail{display:none;border-top:1px solid var(--line-soft);padding:10px 12px;background:var(--bg-soft)}
.match.open .m-detail{display:block;animation:fade .22s}
.goals{display:grid;grid-template-columns:1fr 1fr;gap:4px 14px;margin-bottom:9px}
.goals .gcol h5{font-size:.6rem;color:var(--txt-faint);font-weight:800;letter-spacing:.05em;margin-bottom:4px;text-transform:uppercase}
.goals .gcol.away{text-align:right}
.gitem{font-size:.74rem;color:var(--txt-dim);padding:1px 0;display:flex;gap:6px;align-items:baseline}
.goals .away .gitem{flex-direction:row-reverse}
.gitem .min{color:var(--accent-2);font-weight:800;font-variant-numeric:tabular-nums;flex:none}
.gitem .pen{color:var(--txt-faint);font-size:.64rem}
.stats-row{display:flex;flex-direction:column;gap:6px}
.stat{display:grid;grid-template-columns:34px 1fr 34px;align-items:center;gap:8px;font-size:.7rem}
.stat .v{font-weight:800;color:var(--txt);font-variant-numeric:tabular-nums}
.stat .v.l{text-align:left}.stat .v.r{text-align:right}
.bar{height:5px;border-radius:3px;background:var(--line);position:relative;overflow:hidden;display:flex}
.bar i{height:100%;display:block}
.bar i.h{background:var(--accent-2)}
.bar i.a{background:var(--txt-faint)}
.stat-lbl{text-align:center;font-size:.58rem;color:var(--txt-faint);font-weight:700;margin-bottom:-2px}
.no-detail{font-size:.7rem;color:var(--txt-faint);text-align:center;padding:2px}

/* ---------- Bracket: classic pyramid ---------- */
.bracket-intro{padding:14px 2px 8px;font-size:.74rem;color:var(--txt-dim);line-height:1.55}
.bracket-scroll{overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;padding:4px 14px 14px;margin:0 -14px}
@media(min-width:1500px){
  #bracket-pyramid{--tieW:158px;--colGap:34px}
}
.bracket-note{font-size:.62rem;color:var(--txt-faint);margin-top:12px;line-height:1.55;padding:0 2px}

/* tie card */
.tie{
  background:var(--bg-card);border:1px solid var(--line-soft);border-radius:8px;
  overflow:hidden;font-size:.72rem;width:var(--tieW);flex:none;
}
.tie.empty{opacity:.62}
.tie.champ{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold),0 6px 20px rgba(200,148,26,.22)}
.tie .tie-head{display:flex;justify-content:space-between;align-items:center;
  font-size:.5rem;color:var(--txt-faint);font-weight:700;padding:3px 7px;background:var(--bg-soft);border-bottom:1px solid var(--line-soft)}
.tie .tie-head .mno{color:var(--accent-2);font-weight:800}
.tie.champ .tie-head .mno{color:var(--gold)}
.tie .slot{display:flex;align-items:center;gap:5px;padding:4px 7px;min-height:25px}
.tie .slot+.slot{border-top:1px solid var(--line-soft)}
.tie .slot .flag{font-size:.8rem;flex:none;color:var(--txt-faint)}
.tie .slot .flag .flagimg{width:18px;height:12px}
.tie .slot .s-nm{flex:1;font-weight:600;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:.72rem}
.tie .slot .s-nm.tbd{color:var(--txt-faint);font-weight:600;font-size:.66rem}
.tie .slot .s-sc{font-weight:800;color:var(--txt-faint);font-variant-numeric:tabular-nums;font-size:.72rem}
.tie .slot.win .s-nm{color:var(--accent)}

/* ===== Pyramid engine ===== */
#bracket-pyramid{
  --tieW:150px;     /* card width */
  --colGap:30px;    /* horizontal gap between rounds (room for connectors) */
  --cellH:62px;     /* fixed height per R32 row -> drives whole pyramid */
  display:flex;align-items:stretch;justify-content:center;
  width:max-content;min-width:100%;margin:0 auto;padding:4px 0 10px;position:relative;
}
.side{display:flex;align-items:stretch}
.side.left{flex-direction:row}
.side.right{flex-direction:row-reverse}
.round{display:flex;flex-direction:column;justify-content:space-around;position:relative;
  height:calc(var(--cellH) * 8);padding-top:18px;box-sizing:content-box;}
.round+.round{margin-left:var(--colGap)}
.side.right .round+.round{margin-left:0;margin-right:var(--colGap)}
.round .rcell{display:flex;align-items:center;justify-content:center;flex:1;position:relative}
.conn-svg{z-index:0}
.tie{position:relative;z-index:1}

/* center final column */
.center-col{display:flex;flex-direction:column;align-items:center;justify-content:center;
  margin:0 var(--colGap);position:relative;height:calc(var(--cellH) * 8);padding-top:18px;box-sizing:content-box}
.center-col .champ-label{font-size:.6rem;font-weight:800;color:var(--gold);letter-spacing:.08em;margin-bottom:7px;text-align:center}
.center-col .trophy{font-size:1.4rem;text-align:center;margin-bottom:6px;filter:drop-shadow(0 2px 6px rgba(200,148,26,.45))}
.center-col .third{margin-top:14px;width:var(--tieW)}
.center-col .third-lbl{font-size:.56rem;font-weight:700;color:var(--txt-faint);text-align:center;margin-bottom:5px;letter-spacing:.04em}

/* round header labels */
.round-hd{position:absolute;top:-2px;left:0;right:0;text-align:center;
  font-size:.54rem;font-weight:700;color:var(--txt-faint);letter-spacing:.05em;pointer-events:none}

/* mobile: shrink cards + gaps so the whole pyramid fits the scroll */
@media(max-width:760px){
  #bracket-pyramid{--tieW:106px;--colGap:20px;--cellH:58px;}
  .tie .slot .s-nm{font-size:.62rem}
  .tie .slot .s-nm.tbd{font-size:.56rem}
  .tie .tie-head{font-size:.46rem}
}
@media(max-width:430px){
  #bracket-pyramid{--tieW:88px;--colGap:16px;--cellH:56px;}
}

footer{padding:26px 14px 30px;text-align:center;font-size:.64rem;color:var(--txt-faint);line-height:1.7}
footer a{color:var(--txt-dim)}
</style>
</head>
<body>
<header>
  <div class="head-inner">
    <div class="brand">
      <span class="yr">2026</span>
      <span class="nm">FIFA 월드컵 · 북중미</span>
    </div>
    <span class="host">🇨🇦 🇲🇽 🇺🇸 · 6.11–7.19</span>
  </div>
  <div class="tabs" role="tablist" id="tabs"></div>
</header>

<main class="wrap">
  <!-- GROUP STAGE -->
  <section class="stage" id="stage-group" role="tabpanel">
    <div class="group-layout">
      <nav class="rail" id="rail" aria-label="조 선택"></nav>
      <div class="panel" id="panel"></div>
    </div>
  </section>

  <!-- KNOCKOUT -->
  <section class="stage" id="stage-knock" role="tabpanel">
    <div class="bracket-intro" id="bracket-intro"></div>
    <div class="bracket-scroll">
      <div id="bracket-pyramid"></div>
    </div>
    <div class="bracket-note" id="bracket-note"></div>
  </section>
</main>

<footer>
  데이터: FIFA · ESPN · Yahoo Sports · Wikipedia 기준 (2026.6.17 KST)<br>

</footer>

/* ============ STANDINGS CALC ============ */
function standings(key){
 const grp=G[key];
 const row={};
 grp.teams.forEach(t=>row[t]={t,pld:0,w:0,d:0,l:0,gf:0,ga:0,pts:0});
 grp.matches.forEach(mt=>{
  if(mt.st!=="ft"&&mt.st!=="live")return;
  if(mt.hs==null)return;
  const H=row[mt.h],A=row[mt.a];
  H.pld++;A.pld++;H.gf+=mt.hs;H.ga+=mt.as;A.gf+=mt.as;A.ga+=mt.hs;
  if(mt.hs>mt.as){H.w++;A.l++;H.pts+=3;}
  else if(mt.hs<mt.as){A.w++;H.l++;A.pts+=3;}
  else{H.d++;A.d++;H.pts++;A.pts++;}
 });
 return Object.values(row).map(r=>({...r,gd:r.gf-r.ga}))
  .sort((a,b)=> b.pts-a.pts || b.gd-a.gd || b.gf-a.gf || a.t.localeCompare(b.t));
}

function standings_safe(g){ return (g.length===1 && G[g]) ? standings(g) : null; }
function qualifierSlot(spec){
 const st=standings_safe(spec.g);
 if(spec.type==="1"||spec.type==="2"){
  if(st && spec.g.length===1){
   const grp=G[spec.g], allDone=grp.matches.every(m=>m.st==="ft");
   if(allDone)return {known:true,team:st[spec.type==="1"?0:1].t};
  }
  return {known:false,label:spec.type==="1"?`${spec.g}1위`:`${spec.g}2위`};
 }
 return {known:false,label:`${spec.g.replace(/\//g,'·')} 3위`};
}
function winnerSlot(matchNo,kind){ return {known:false,label:`${matchNo} ${kind==="loser"?"패":"승"}`}; }
function slotHTML(s){
 return s.known
  ? `<div class="slot"><span class="flag">${fl(s.team)}</span><span class="s-nm">${nm(s.team)}</span><span class="s-sc">–</span></div>`
  : `<div class="slot"><span class="flag">＿</span><span class="s-nm tbd">${s.label}</span></div>`;
}
function tieHTML(t,a,b,cls){
 const empty=!a.known&&!b.known;
 const head=t.champ?`🏆 결승`:(t.third?`🥉 3위전`:`M${t.m}`);
 return `<div class="tie${empty?' empty':''}${cls?' '+cls:''}">
   <div class="tie-head"><span class="mno">${head}</span><span>${t.date}·${t.v}</span></div>
   ${slotHTML(a)}${slotHTML(b)}
 </div>`;
}
function r32Slots(t){return [qualifierSlot(t.h),qualifierSlot(t.a)];}
function linkSlots(t,kind){return [winnerSlot(t.from[0],kind),winnerSlot(t.from[1],kind)];}

/* split bracket into left / right halves (the two SF feeders) */
function buildHalves(){
 const feed=no=>{const r=R16.find(x=>x.m===no);return r?r.from:[];};
 // SF M101 = QF 97(R16 89,90) + QF 98(R16 93,94)
 // SF M102 = QF 99(R16 91,92) + QF 100(R16 95,96)
 const leftR16=[89,90,93,94], rightR16=[91,92,95,96];
 const leftR32=leftR16.flatMap(feed), rightR32=rightR16.flatMap(feed);
 const leftQF=[97,98], rightQF=[99,100];
 return {
  left:{r32:leftR32, r16:leftR16, qf:leftQF, sf:101},
  right:{r32:rightR32, r16:rightR16, qf:rightQF, sf:102}
 };
}

/* render one side. side='left'|'right'. order of cells top->bottom must keep pairs adjacent */
function renderSide(side, H){
 const byR32=no=>R32.find(x=>x.m===no);
 const byR16=no=>R16.find(x=>x.m===no);
 const byQF =no=>QF.find(x=>x.m===no);
 const sf = side==="left"?SF[0]:SF[1];

 // R32 cells: order them so each consecutive pair feeds one R16.
 // R16 list order defines pairing; for each R16 match, its .from gives the two R32 feeders in order.
 const r32order=[];
 H.r16.forEach(r16no=>{ const f=byR16(r16no).from; r32order.push(f[0],f[1]); });

 const colR32=`<div class="round"><div class="round-hd">32강</div>${
   r32order.map((no,i)=>{const t=byR32(no);const[a,b]=r32Slots(t);
     const cls=i%2===0?'up':'dn';
     return `<div class="rcell ${cls}">${tieHTML(t,a,b)}</div>`;}).join("")
 }</div>`;

 const colR16=`<div class="round"><div class="round-hd">16강</div>${
   H.r16.map((no,i)=>{const t=byR16(no);const[a,b]=linkSlots(t);
     const cls=i%2===0?'up':'dn';
     return `<div class="rcell ${cls}">${tieHTML(t,a,b)}</div>`;}).join("")
 }</div>`;

 const colQF=`<div class="round"><div class="round-hd">8강</div>${
   H.qf.map((no,i)=>{const t=byQF(no);const[a,b]=linkSlots(t);
     const cls=i%2===0?'up':'dn';
     return `<div class="rcell ${cls}">${tieHTML(t,a,b)}</div>`;}).join("")
 }</div>`;

 const[sa,sb]=linkSlots(sf);
 const colSF=`<div class="round"><div class="round-hd">준결승</div>
   <div class="rcell">${tieHTML(sf,sa,sb)}</div></div>`;

 const inner = side==="left"
   ? colR32+colR16+colQF+colSF
   : colR32+colR16+colQF+colSF; // same DOM order; row-reverse flips visually
 return `<div class="side ${side}">${inner}</div>`;
}

function renderCenter(){
 const[fa,fb]=linkSlots(FIN,"winner");
 const[ta,tb]=linkSlots(TP,"loser");
 FIN.champ=true; TP.third=true;
 return `<div class="center-col">
   <div class="trophy">🏆</div>
   <div class="champ-label">CHAMPION</div>
   ${tieHTML(FIN,fa,fb,"champ")}
   <div class="third">
     <div class="third-lbl">3·4위전</div>
     ${tieHTML(TP,ta,tb)}
   </div>
 </div>`;
}

function renderBracket(){
 document.getElementById("bracket-intro").innerHTML=
  `좌·우 16팀씩, 안쪽으로 이길수록 좁혀져 가운데 결승에서 만나는 정통 대진표입니다. 가로로 스크롤하면 전체가 보입니다. 조별리그가 끝나면 32강 칸부터 진출국이 채워지고, 이후 라운드는 승자로 이어집니다.`;
 const H=buildHalves();
 const html = renderSide("left",H.left) + renderCenter() + renderSide("right",H.right);
 document.getElementById("bracket-pyramid").innerHTML=html;
 document.getElementById("bracket-note").innerHTML=
  `M번호는 FIFA 공식 경기 번호입니다. 좌측 절반은 준결승 M101, 우측 절반은 M102로 수렴합니다. "＿"·"M○○ 승" 표시는 결과가 확정되면 국가명으로 바뀝니다.`;
 alignConnectors();
}

/* draw vertical brace connectors between rounds using measured positions */
function alignConnectors(){
 const py=document.getElementById("bracket-pyramid");
 if(!py)return;
 // remove old svg overlays
 py.querySelectorAll(".conn-svg").forEach(e=>e.remove());
 requestAnimationFrame(()=>{
  const pr=py.getBoundingClientRect();
  ["left","right"].forEach(sideName=>{
   const side=py.querySelector(".side."+sideName);
   if(!side)return;
   const rounds=[...side.querySelectorAll(".round")];
   for(let i=0;i<rounds.length-1;i++){
    const cur=[...rounds[i].querySelectorAll(".tie")];
    const nxt=[...rounds[i+1].querySelectorAll(".tie")];
    nxt.forEach((ncard,j)=>{
     const c1=cur[j*2], c2=cur[j*2+1];
     if(!c1||!c2)return;
     const r1=c1.getBoundingClientRect(), r2=c2.getBoundingClientRect(), rn=ncard.getBoundingClientRect();
     const y1=r1.top+r1.height/2-pr.top, y2=r2.top+r2.height/2-pr.top, yn=rn.top+rn.height/2-pr.top;
     let xStart, xElbow, xEnd;
     if(sideName==="left"){ xStart=r1.right-pr.left; xEnd=rn.left-pr.left; }
     else { xStart=r1.left-pr.left; xEnd=rn.right-pr.left; }
     xElbow=(xStart+xEnd)/2;
     const svg=document.createElementNS("http://www.w3.org/2000/svg","svg");
     svg.setAttribute("class","conn-svg");
     svg.style.cssText="position:absolute;left:0;top:0;width:100%;height:100%;pointer-events:none;overflow:visible";
     svg.setAttribute("width",pr.width); svg.setAttribute("height",pr.height);
     const path=document.createElementNS("http://www.w3.org/2000/svg","path");
     const d=`M${xStart} ${y1} H${xElbow} V${y2} H${xStart} M${xElbow} ${(y1+y2)/2} H${xEnd}`;
     path.setAttribute("d",d);
     path.setAttribute("stroke","var(--line)");
     path.setAttribute("stroke-width","2");
     path.setAttribute("fill","none");
     svg.appendChild(path);
     py.appendChild(svg);
    });
   }
  });
 });
}
window.addEventListener("resize",()=>{ if(document.getElementById("stage-knock").classList.contains("on")) alignConnectors(); });

/* ============ INIT ============ */
renderTabs();
renderRail();
renderPanel();
renderBracket();
</script>
